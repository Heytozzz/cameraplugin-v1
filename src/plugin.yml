main: water.of.cup.Camera
name: Cameras
version: '0.1'
description: Take Pictures.
author: Nicholas Kopiwoda
api-version: '1.21'
commands:
  takepicture:
    description: take a picture
  camerareload:
    description: reload the Cameras config.yml (and colors/recipe) without restarting the server
    aliases: [camreload, cameras]
  cameraalbum:
    description: get an up-to-date copy of your photo collection album book
    aliases: [album, camalbum]
